name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxtst-dev libx11-xcb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./internal/protocol/... ./internal/config/...

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxtst-dev libx11-xcb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev

      - name: Build Linux binary
        run: |
          mkdir -p build
          go build -o build/vishare ./cmd/vishare

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vishare-linux-amd64
          path: build/vishare

  build-windows:
    name: Build (Windows cross-compile)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build Windows binary
        run: |
          mkdir -p build
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
            CC=x86_64-w64-mingw32-gcc \
            go build -o build/vishare.exe ./cmd/vishare

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vishare-windows-amd64
          path: build/vishare.exe
